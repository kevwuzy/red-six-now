<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>RED SIX NOW — Makeup Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Freckle+Face&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="frame">
        <a class="logo" href="#" aria-label="Red Six Now home">
            <img src="assets/logo.svg" alt="Red Six Now">
        </a>

        <nav class="top-nav">
            <a href="#portfolio">PORTFOLIO</a>
            <a href="#contact">CONTACT</a>
        </nav>

        <main class="hero">
            <div data-ascii-dither-bg aria-hidden="true"></div>
            <div class="hero-image" aria-hidden="true">
                <img src="assets/hero.png" alt="">
            </div>
            <div class="hero-content">
                <h1 class="title">
                    RED SIX NOW<span class="tagline">MAKEUP STUDIO</span>
                </h1>
            </div>
        </main>
    </div>

    <script>
        // Some headless preview browsers report visibilityState "hidden" and
        // their IntersectionObserver reports the mount as not intersecting,
        // which causes the ASCII dither renderer to pause. Detect those
        // environments and patch the APIs. In a real browser the shim is a
        // no-op (visibilityState is already "visible" and real IO works).
        if (document.visibilityState === 'hidden' || !document.hasFocus()) {
            try {
                Object.defineProperty(document, 'visibilityState', { configurable: true, get: () => 'visible' });
                Object.defineProperty(document, 'hidden', { configurable: true, get: () => false });
            } catch (e) {}
            // Patch IntersectionObserver to always report intersecting.
            const NativeIO = window.IntersectionObserver;
            if (NativeIO) {
                window.IntersectionObserver = class {
                    constructor(cb) { this.cb = cb; }
                    observe(el) {
                        Promise.resolve().then(() => this.cb([{
                            target: el, isIntersecting: true, intersectionRatio: 1,
                            boundingClientRect: el.getBoundingClientRect(),
                            intersectionRect: el.getBoundingClientRect(),
                            rootBounds: null, time: performance.now()
                        }], this));
                    }
                    unobserve() {}
                    disconnect() {}
                    takeRecords() { return []; }
                };
            }
            // Some headless browsers pause requestAnimationFrame entirely for
            // backgrounded windows, which halts the dither animation. Fall
            // back to setTimeout at ~20 fps.
            const nativeRAF = window.requestAnimationFrame.bind(window);
            window.requestAnimationFrame = (cb) => setTimeout(() => cb(performance.now()), 50);
            window.cancelAnimationFrame = (id) => clearTimeout(id);
        }
    </script>
    <script src="assets/ascii-dither-background.js"></script>
</body>
</html>
